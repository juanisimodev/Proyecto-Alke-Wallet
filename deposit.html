<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depositar Fondos</title>
  
  <!-- CORRECCIÓN AQUÍ: Se cambió 'class' por 'rel' -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  
  <!-- CORRECCIÓN AQUÍ: Se eliminó el espacio extra al final de 'styles.css' -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4"><i class="fas fa-piggy-bank text-success mr-2"></i>Depositar Fondos</h1>
    
    <div class="card p-4 bg-light mb-3 shadow-sm border-0">
      <h5>Tu Saldo Actual es: <span id="currentBalanceDisplay" class="text-info font-weight-bold">$0.00</span></h5>
    </div>

    <form id="depositForm">
      <div class="form-group">
        <label for="amount">Monto específico a depositar ($):</label>
        <input type="number" id="amount" class="form-control form-control-lg" placeholder="Ej: 5000" required min="1">
      </div>
      
      <div id="alert-container"></div>
      <div id="confirmation-legend" class="text-muted font-italic my-2 text-center"></div>

      <button id="depositBtn" type="submit" class="btn btn-success btn-block py-2">Confirmar Depósito</button>
    </form>
    
    <a href="menu.html" class="btn btn-outline-secondary btn-block mt-3"><i class="fas fa-arrow-left mr-1"></i> Volver al Menú</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="assets/js/deposit.js"></script>
</body>
</html>
