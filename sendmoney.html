<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4"><i class="fas fa-paper-plane text-primary mr-2"></i>Enviar Dinero</h1>

    <div class="card p-3 my-3 shadow-sm border-0 bg-light">
      <h5><i class="fas fa-address-book mr-2 text-secondary"></i>Buscar en Agenda</h5>
      <div class="input-group mb-3">
        <input type="text" id="searchContact" class="form-control" placeholder="Buscar contacto por nombre o alias...">
      </div>
      
      <label class="font-weight-bold">Selecciona un destinatario de la lista:</label>
      <div class="list-group shadow-sm" id="contactListGroup">
        <button type="button" class="list-group-item list-group-item-action contact-item" data-name="Pedro Pérez" data-alias="pedro.wallet">Pedro Pérez (Alias: pedro.wallet)</button>
        <button type="button" class="list-group-item list-group-item-action contact-item" data-name="María López" data-alias="maria.dev">María López (Alias: maria.dev)</button>
      </div>
    </div>

    <button id="btnShowAddContact" class="btn btn-info btn-block my-2"><i class="fas fa-user-plus mr-1"></i> Agregar nuevo contacto</button>

    <div id="addContactFormContainer" class="card p-3 my-3 bg-white border-info d-none shadow-sm">
      <h5 class="text-info">Nuevo Contacto Bancario</h5>
      <form id="newContactForm">
        <input type="text" id="cName" class="form-control mb-2" placeholder="Nombre y Apellido completo" required>
        <input type="text" id="cCBU" class="form-control mb-2" placeholder="Número de CBU / Cuenta (22 dígitos)" required>
        <input type="text" id="cAlias" class="form-control mb-2" placeholder="Alias de la Wallet" required>
        <input type="text" id="cBank" class="form-control mb-2" placeholder="Institución Financiera / Banco" required>
        <div id="modalValidationError" class="text-danger my-1 font-weight-bold"></div>
        
        <div class="row mt-2">
          <div class="col-6"><button type="submit" class="btn btn-success btn-block">Guardar</button></div>
          <div class="col-6"><button type="button" id="btnCancelAddContact" class="btn btn-secondary btn-block">Cancelar</button></div>
        </div>
      </form>
    </div>

    <form id="transferForm" class="mt-4">
      <div class="form-group">
        <label class="font-weight-bold">Contacto Seleccionado:</label>
        <input type="text" id="selectedContactDisplay" class="form-control bg-white" readonly required placeholder="Ninguno seleccionado">
      </div>
      <div class="form-group">
        <label for="sendAmount" class="font-weight-bold">Monto a Enviar ($):</label>
        <input type="number" id="sendAmount" class="form-control" min="1" required placeholder="0.00">
      </div>
      
      <button id="sendMoneyBtn" type="submit" class="btn btn-primary btn-block d-none py-2">Efectuar Transferencia</button>
    </form>

    <div id="confirmation-message" class="mt-3"></div>

    <a href="menu.html" class="btn btn-outline-secondary btn-block mt-3"><i class="fas fa-arrow-left mr-1"></i> Volver al Menú</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="assets/js/sendmoney.js"></script>
</body>
</html>
