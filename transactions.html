<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Últimos Movimientos</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="container container-wide mt-5">
    <h1><i class="fas fa-history text-secondary mr-2"></i>Historial de Movimientos</h1>

    <div class="form-group my-4 bg-light p-3 rounded shadow-sm">
      <label for="filterType" class="font-weight-bold">Filtrar movimientos por tipo de operación:</label>
      <select id="filterType" class="form-control">
        <option value="todos">-- Mostrar Todos los Movimientos --</option>
        <option value="depósito">Depósitos Realizados</option>
        <option value="transferencia">Transferencias Enviadas</option>
      </select>
    </div>

    <div class="table-responsive shadow-sm rounded">
      <table class="table table-striped table-hover mb-0">
        <thead class="thead-dark">
          <tr>
            <th>Operación / Concepto</th>
            <th>Monto</th>
            <th>Fecha y Hora</th>
          </tr>
        </thead>
        <tbody id="transactionsBody">
          </tbody>
      </table>
    </div>

    <a href="menu.html" class="btn btn-secondary btn-block mt-4"><i class="fas fa-home mr-1"></i> Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="assets/js/transactions.js"></script>
</body>
</html>
